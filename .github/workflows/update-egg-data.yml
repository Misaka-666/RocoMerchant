name: Update Egg Data

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch egg data
        run: node .github/scripts/fetch-egg-data.js

      - name: Check for changes
        id: check
        run: |
          git diff --quiet egg-data-versioned.json || echo "changed=true" >> $GITHUB_OUTPUT
          git diff --quiet entry/src/main/resources/rawfile/egg-data.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add egg-data-versioned.json entry/src/main/resources/rawfile/egg-data.js
          git commit -m "Auto-update egg data [skip ci]"
          git push

      - name: No changes
        if: steps.check.outputs.changed != 'true'
        run: echo "No changes detected, skipping commit"
