<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孵蛋鉴定</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="egg.css">
</head>
<body>
    <div class="egg-page">
        <div class="background"></div>
        <div class="content-container">

            <div class="header">
                <div class="title-section">
                    <div class="title-main">
                        <div class="title-text">孵蛋鉴定</div>
                    </div>
                    <div class="subtitle">输入蛋的身高和体重，反查可能孵出的精灵</div>
                </div>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label>蛋身高（米）</label>
                    <input type="number" id="input-height" step="0.001" placeholder="例如：0.256">
                </div>
                <div class="input-group">
                    <label>蛋体重（kg）</label>
                    <input type="number" id="input-weight" step="0.1" placeholder="例如：2.5">
                </div>
                <button class="btn-search" onclick="searchEggs()">鉴定</button>
            </div>

            <div id="result-section" style="display:none">
                <div class="result-header">
                    <span>匹配结果：</span>
                    <span id="result-count">0</span>
                    <span>个精灵</span>
                </div>
                <div id="result-list"></div>
            </div>

            <div id="empty-state" style="display:none">
                <div class="empty-icon">🥚</div>
                <div class="empty-text">没有找到匹配的精灵</div>
            </div>

            <div id="initial-state">
                <div class="empty-icon">🥚</div>
                <div class="empty-text">输入蛋的身高或体重开始鉴定</div>
            </div>

            <button class="btn-back" onclick="goBack()">返回商人</button>

        </div>
    </div>
    <script src="egg.js"></script>
</body>
</html>
