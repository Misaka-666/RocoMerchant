<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洛克王国助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-page">

        <!-- 远行商人模块 -->
        <div id="page-merchant" class="page-content active">
            <div class="background"></div>
            <div class="content-container">

                <div class="header">
                    <div class="title-section">
                        <div class="title-main">
                            <div class="title-badge"><img src="img/title-icon.png" onerror="this.style.display='none'" alt=""></div>
                            <div class="title-text">远行商人</div>
                        </div>
                        <div class="subtitle" id="subtitle">每日 08:00 / 12:00 / 16:00 / 20:00 刷新</div>
                    </div>
                    <div class="header-side">
                        <div class="summary-chip">在售商品 <strong id="product-count">-</strong></div>
                        <div class="round-info">
                            <div class="round-pill" id="round-pill">第 - / 4 轮</div>
                            <div class="countdown-pill" id="countdown-pill">--</div>
                        </div>
                    </div>
                </div>

                <div id="loading" class="loading-state">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">加载中...</div>
                </div>

                <div id="error-state" class="error-state" style="display:none">
                    <div class="error-icon">!</div>
                    <div class="error-text" id="error-text"></div>
                    <button class="btn-retry" onclick="loadData()">重试</button>
                </div>

                <div class="products-grid" id="products-container" style="display:none"></div>

                <div id="history-section" style="display:none">
                    <div class="history-title">今日历史商品</div>
                    <div id="history-container"></div>
                </div>

                <button class="btn-refresh" id="btn-refresh" onclick="loadData()" style="display:none">&#x21bb; 刷新</button>

            </div>
        </div>

        <!-- 孵蛋鉴定模块 -->
        <div id="page-egg" class="page-content">
            <div class="background"></div>
            <div class="content-container">

                <div class="header">
                    <div class="title-section">
                        <div class="title-main">
                            <div class="title-text">孵蛋鉴定</div>
                        </div>
                        <div class="subtitle">输入蛋的身高和体重，反查可能孵出的精灵</div>
                    </div>
                </div>

                <div class="input-section">
                    <div class="input-group">
                        <label>蛋身高（米）</label>
                        <input type="number" id="input-height" step="0.001" placeholder="例如：0.256">
                    </div>
                    <div class="input-group">
                        <label>蛋体重（kg）</label>
                        <input type="number" id="input-weight" step="0.1" placeholder="例如：2.5">
                    </div>
                    <button class="btn-search" onclick="searchEggs()">鉴定</button>
                </div>

                <div id="result-section" style="display:none">
                    <div class="result-header">
                        <span>匹配结果：</span>
                        <span id="result-count">0</span>
                        <span>个精灵</span>
                    </div>
                    <div id="result-list"></div>
                </div>

                <div id="empty-state" class="egg-empty" style="display:none">
                    <div class="empty-icon">🥚</div>
                    <div class="empty-text">没有找到匹配的精灵</div>
                </div>

                <div id="initial-state" class="egg-empty">
                    <div class="empty-icon">🥚</div>
                    <div class="empty-text">输入蛋的身高或体重开始鉴定</div>
                </div>

            </div>
        </div>

        <!-- 精灵图鉴模块 -->
        <div id="page-pokedex" class="page-content">
            <div class="background"></div>
            <div class="content-container">

                <div class="pokedex-header">
                    <div class="pokedex-title">精灵图鉴</div>
                    <div class="pokedex-subtitle">共 <span id="pokedex-total">0</span> 个精灵</div>
                </div>

                <div class="pokedex-search">
                    <input type="text" id="pokedex-search-input" placeholder="搜索精灵（中文名/英文名/编号）" oninput="filterPokedex()">
                </div>

                <div class="pokedex-filters">
                    <div class="type-filters" id="type-filters"></div>
                    <div class="sort-filter">
                        <select id="pokedex-sort" onchange="filterPokedex()">
                            <option value="no-asc">编号 ↑</option>
                            <option value="no-desc">编号 ↓</option>
                            <option value="total-desc">种族值 ↓</option>
                            <option value="total-asc">种族值 ↑</option>
                            <option value="name-asc">名称 A-Z</option>
                        </select>
                    </div>
                </div>

                <div class="pokedex-grid" id="pokedex-grid"></div>

                <div id="pokedex-empty" class="pokedex-empty" style="display:none">
                    <div class="empty-icon">📖</div>
                    <div class="empty-text">没有找到匹配的精灵</div>
                </div>

            </div>
        </div>

        <!-- 精灵详情弹出层（根级别） -->
        <div id="pokedex-detail" class="pokedex-detail" style="display:none">
            <div class="pokedex-detail-header">
                <button class="pokedex-detail-back" onclick="closePokedexDetail()">← 返回</button>
                <div class="pokedex-detail-no" id="detail-no"></div>
            </div>
            <div class="pokedex-detail-img" id="detail-img"></div>
            <div class="pokedex-detail-name" id="detail-name"></div>
            <div class="pokedex-detail-name-en" id="detail-name-en"></div>
            <div class="pokedex-detail-type" id="detail-type"></div>
            <div class="pokedex-detail-stats" id="detail-stats"></div>

            <!-- 基础信息 -->
            <div class="pokedex-detail-section" id="detail-info-section">
                <div class="pokedex-detail-section-title">基础信息</div>
                <div class="pokedex-detail-info" id="detail-info"></div>
            </div>

            <!-- 描述 -->
            <div class="pokedex-detail-section" id="detail-desc-section" style="display:none">
                <div class="pokedex-detail-section-title">介绍</div>
                <div class="pokedex-detail-desc" id="detail-desc"></div>
            </div>

            <!-- 特性 -->
            <div class="pokedex-detail-section" id="detail-trait-section" style="display:none">
                <div class="pokedex-detail-section-title">特性</div>
                <div class="pokedex-detail-trait" id="detail-trait"></div>
            </div>

            <!-- 种族值 -->
            <div class="pokedex-detail-section" id="detail-base-stats-section" style="display:none">
                <div class="pokedex-detail-section-title">基础种族值</div>
                <div class="pokedex-detail-base-stats" id="detail-base-stats"></div>
            </div>

            <!-- 属性克制 -->
            <div class="pokedex-detail-section" id="detail-matchups-section" style="display:none">
                <div class="pokedex-detail-section-title">属性克制</div>
                <div class="pokedex-detail-matchups" id="detail-matchups"></div>
            </div>

            <!-- 技能 -->
            <div class="pokedex-detail-section" id="detail-skills-section" style="display:none">
                <div class="pokedex-detail-section-title">技能</div>
                <div class="pokedex-detail-skills" id="detail-skills"></div>
            </div>

            <a class="pokedex-detail-link" id="detail-link" href="#" target="_blank">在网页中查看完整资料 →</a>
        </div>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('merchant')">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">远行商人</span>
            </div>
            <div class="nav-item" onclick="switchTab('egg')">
                <span class="nav-icon">🥚</span>
                <span class="nav-label">孵蛋鉴定</span>
            </div>
            <div class="nav-item" onclick="switchTab('pokedex')">
                <span class="nav-icon">📖</span>
                <span class="nav-label">精灵图鉴</span>
            </div>
        </nav>

    </div>
    <script src="egg-data.js"></script>
    <script src="pokedex-data.js"></script>
    <script src="pokedex-detail-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
