<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洛克王国助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-page">

        <!-- 远行商人模块 -->
        <div id="page-merchant" class="page-content active">
            <div class="background"></div>
            <div class="content-container">

                <div class="header">
                    <div class="title-section">
                        <div class="title-main">
                            <div class="title-badge"><img src="img/title-icon.png" onerror="this.style.display='none'" alt=""></div>
                            <div class="title-text">远行商人</div>
                        </div>
                        <div class="subtitle" id="subtitle">每日 08:00 / 12:00 / 16:00 / 20:00 刷新</div>
                    </div>
                    <div class="header-side">
                        <div class="summary-chip">在售商品 <strong id="product-count">-</strong></div>
                        <div class="round-info">
                            <div class="round-pill" id="round-pill">第 - / 4 轮</div>
                            <div class="countdown-pill" id="countdown-pill">--</div>
                        </div>
                    </div>
                </div>

                <div id="loading" class="loading-state">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">加载中...</div>
                </div>

                <div id="error-state" class="error-state" style="display:none">
                    <div class="error-icon">!</div>
                    <div class="error-text" id="error-text"></div>
                    <button class="btn-retry" onclick="loadData()">重试</button>
                </div>

                <div class="products-grid" id="products-container" style="display:none"></div>

                <div id="history-section" style="display:none">
                    <div class="history-title">今日历史商品</div>
                    <div id="history-container"></div>
                </div>

                <button class="btn-refresh" id="btn-refresh" onclick="loadData()" style="display:none">&#x21bb; 刷新</button>

            </div>
        </div>

        <!-- 孵蛋鉴定模块 -->
        <div id="page-egg" class="page-content">
            <div class="background"></div>
            <div class="content-container">

                <div class="header">
                    <div class="title-section">
                        <div class="title-main">
                            <div class="title-text">孵蛋鉴定</div>
                        </div>
                        <div class="subtitle">输入蛋的身高和体重，反查可能孵出的精灵</div>
                    </div>
                </div>

                <div class="input-section">
                    <div class="input-group">
                        <label>蛋身高（米）</label>
                        <input type="number" id="input-height" step="0.001" placeholder="例如：0.256">
                    </div>
                    <div class="input-group">
                        <label>蛋体重（kg）</label>
                        <input type="number" id="input-weight" step="0.1" placeholder="例如：2.5">
                    </div>
                    <button class="btn-search" onclick="searchEggs()">鉴定</button>
                </div>

                <div id="result-section" style="display:none">
                    <div class="result-header">
                        <span>匹配结果：</span>
                        <span id="result-count">0</span>
                        <span>个精灵</span>
                    </div>
                    <div id="result-list"></div>
                </div>

                <div id="empty-state" class="egg-empty" style="display:none">
                    <div class="empty-icon">🥚</div>
                    <div class="empty-text">没有找到匹配的精灵</div>
                </div>

                <div id="initial-state" class="egg-empty">
                    <div class="empty-icon">🥚</div>
                    <div class="empty-text">输入蛋的身高或体重开始鉴定</div>
                </div>

            </div>
        </div>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('merchant')">
                <span class="nav-icon">🛒</span>
                <span class="nav-label">远行商人</span>
            </div>
            <div class="nav-item" onclick="switchTab('egg')">
                <span class="nav-icon">🥚</span>
                <span class="nav-label">孵蛋鉴定</span>
            </div>
        </nav>

    </div>
    <script src="egg-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
